# spring-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
        - name: spring-app
          image: spring-app:1.0
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/mydb
            - name: SPRING_DATASOURCE_USERNAME
              value: user
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: http://keycloak:8081/auth
            - name: KEYCLOAK_REALM
              value: spring-realm
            - name: KEYCLOAK_CLIENT_ID
              value: spring-client
            - name: KEYCLOAK_CLIENT_SECRET
              value: DhmlcBpVnQ87E5NiPT3jn4hJjFrMDuZ6